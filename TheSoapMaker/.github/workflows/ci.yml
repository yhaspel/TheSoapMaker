name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  foundation-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          test -d soapmaker-backend
          test -d soapmaker-frontend
          test -f soapmaker-backend/manage.py
          test -f soapmaker-frontend/angular.json
          git diff --check

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soapmaker-backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: soapmaker-backend/requirements/development.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Backend checks
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: "True"
        run: |
          python manage.py check
          pytest --cov=apps --cov-report=xml --cov-report=term-missing -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: soapmaker-backend/coverage.xml
          flags: backend
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: soapmaker-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: soapmaker-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend checks
        run: |
          npx ng test --watch=false --code-coverage --browsers=ChromeHeadless
          npx ng build --configuration=production

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: soapmaker-frontend/coverage/lcov.info
          flags: frontend
        continue-on-error: true
