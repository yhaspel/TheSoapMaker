services:
  - type: web
    name: soapmaker-backend
    env: python
    buildCommand: pip install -r requirements/production.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: soapmaker-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOST
        value: soapmaker-api.onrender.com
      - key: FRONTEND_URL
        value: https://thesoapmaker.vercel.app

databases:
  - name: soapmaker-db
    plan: free
